<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NetGlobe</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="map"></div>

  <div id="app-title">
    <span class="title-text">NetGlobe</span>
    <span class="title-sub">network visualizer</span>
  </div>

  <button id="menu-btn" title="Menu (M)">&#9776;</button>

  <div id="theme-switcher">
    <button class="theme-btn active" data-theme="amber" title="Amber / Retro CRT"></button>
    <button class="theme-btn" data-theme="cyber" title="Blue / Cyberpunk"></button>
    <button class="theme-btn" data-theme="threat" title="Red / Threat Intel"></button>
  </div>

  <div id="menu-overlay" class="hidden"></div>
  <div id="menu-panel" class="hidden">
    <div class="menu-header">Menu</div>
    <button data-action="unmapped">Unmapped Services (U)</button>
    <button data-action="lan_local">LAN / Local (L)</button>
    <button data-action="open_ports">Open Ports (O)</button>
    <button data-action="insights">Insights (I)</button>
    <hr />
    <button data-action="toggle_view">Toggle Heatmap (V)</button>
    <button data-action="cache_terminal">Cache → Terminal (T)</button>
    <button data-action="clear_cache">Clear Cache (C)</button>
    <button data-action="recheck_geoip">Recheck GeoIP (R)</button>
    <hr />
    <button data-action="help">Help (H)</button>
    <button data-action="about">About (A)</button>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal-card">
      <button id="modal-close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="status-bar">
    <span id="status-text">Initializing...</span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <script type="module" src="./main.ts"></script>
</body>
</html>
